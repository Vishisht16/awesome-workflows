# ============================================================================
# Workflow: Duplicate Issue Detector
# ============================================================================
# When a new issue is opened, compares it against all existing open issues
# using word-overlap similarity (Jaccard index). If a potential duplicate is
# found above the threshold, posts a comment with links.
#
# This uses a simple text-similarity approach that works WITHOUT external
# APIs. For better semantic matching, you can swap in an AI-based approach
# using OpenAI embeddings or similar (see comments in the script).
#
# Portability: 🔧 Configurable
#   - Adjust SIMILARITY_THRESHOLD (0.0 – 1.0) to tune sensitivity.
#   - Adjust MAX_RESULTS to limit how many duplicates are shown.
# ============================================================================

name: Duplicate Issue Detector

on:
  issues:
    types: [opened]

jobs:
  detect-duplicates:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check for Duplicate Issues
        uses: actions/github-script@v7
        with:
          script: |
            const newIssue = context.payload.issue;
            const newTitle = newIssue.title || "";
            const newBody = newIssue.body || "";
            const newText = `${newTitle} ${newBody}`;

            // ── Configuration ─────────────────────────────────────────
            // Minimum similarity score (0.0 – 1.0) to flag as duplicate.
            // Higher = stricter matching. 0.3 is a reasonable default.
            const SIMILARITY_THRESHOLD = 0.3;
            // Maximum number of potential duplicates to show
            const MAX_RESULTS = 3;
            // ──────────────────────────────────────────────────────────

            // ── Text Processing Utilities ─────────────────────────────
            // Common English stop words to exclude from comparison
            const STOP_WORDS = new Set([
              "a", "an", "the", "is", "are", "was", "were", "be", "been",
              "being", "have", "has", "had", "do", "does", "did", "will",
              "would", "could", "should", "may", "might", "can", "shall",
              "to", "of", "in", "for", "on", "with", "at", "by", "from",
              "as", "into", "about", "like", "through", "after", "over",
              "between", "out", "against", "during", "without", "before",
              "under", "around", "among", "and", "but", "or", "nor", "not",
              "so", "yet", "both", "either", "neither", "each", "every",
              "all", "any", "few", "more", "most", "other", "some", "such",
              "no", "only", "own", "same", "than", "too", "very", "just",
              "because", "if", "when", "while", "where", "how", "what",
              "which", "who", "whom", "this", "that", "these", "those",
              "i", "me", "my", "we", "our", "you", "your", "he", "him",
              "his", "she", "her", "it", "its", "they", "them", "their"
            ]);

            function tokenize(text) {
              return text
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, " ")
                .split(/\s+/)
                .filter(word => word.length > 2 && !STOP_WORDS.has(word));
            }

            function jaccardSimilarity(textA, textB) {
              const setA = new Set(tokenize(textA));
              const setB = new Set(tokenize(textB));

              if (setA.size === 0 || setB.size === 0) return 0;

              const intersection = new Set([...setA].filter(x => setB.has(x)));
              const union = new Set([...setA, ...setB]);

              return intersection.size / union.size;
            }

            // ── Fetch All Open Issues ─────────────────────────────────
            const allIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                per_page: 100
              }
            );

            // Filter out the current issue and any PRs
            const otherIssues = allIssues.filter(
              i => i.number !== newIssue.number && !i.pull_request
            );

            console.log(`Comparing against ${otherIssues.length} existing open issue(s).`);

            // ── Compare and Rank ──────────────────────────────────────
            const candidates = [];

            for (const existing of otherIssues) {
              const existingText = `${existing.title} ${existing.body || ""}`;
              const score = jaccardSimilarity(newText, existingText);

              if (score >= SIMILARITY_THRESHOLD) {
                candidates.push({
                  number: existing.number,
                  title: existing.title,
                  score: score,
                  url: existing.html_url
                });
              }
            }

            // Sort by similarity score (highest first) and limit results
            candidates.sort((a, b) => b.score - a.score);
            const topMatches = candidates.slice(0, MAX_RESULTS);

            if (topMatches.length === 0) {
              console.log("No potential duplicates found.");
              return;
            }

            // ── Post Comment with Potential Duplicates ─────────────────
            const matchList = topMatches
              .map(m => {
                const pct = Math.round(m.score * 100);
                return `- #${m.number} — **${m.title}** (${pct}% similar)`;
              })
              .join("\n");

            const comment = [
              `🔍 **Potential Duplicate Detected**`,
              ``,
              `This issue may be related to the following existing issue(s):`,
              ``,
              matchList,
              ``,
              `If one of these addresses your concern, please add your input `,
              `there and close this issue. If this is a distinct issue, no `,
              `action is needed.`,
              ``,
              `*This is an automated similarity check. Scores are approximate.*`
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: newIssue.number,
              body: comment
            });

            // Optionally add a label for maintainer review
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: newIssue.number,
              labels: ["possible-duplicate"]
            });

            console.log(`Flagged issue #${newIssue.number} with ${topMatches.length} potential duplicate(s).`);
