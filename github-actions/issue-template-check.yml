# ============================================================================
# Workflow: Issue Template Checker
# ============================================================================
# Validates that newly opened issues actually filled out the issue template
# instead of deleting it or submitting an empty body. Adds a label and
# comments if the issue doesn't meet minimum requirements.
#
# Portability: 🔧 Configurable
#   - Adjust MIN_BODY_LENGTH for your needs.
#   - Edit REQUIRED_SECTIONS to match your issue template's headings.
# ============================================================================

name: Issue Template Checker

on:
  issues:
    types: [opened]

jobs:
  check-template:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Validate Issue Template Compliance
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";
            const author = issue.user.login;

            // ── Configuration ─────────────────────────────────────────
            // Minimum character count for the issue body
            const MIN_BODY_LENGTH = 50;

            // Required section headings (case-insensitive).
            // These should match the headings in your issue template.
            // Set to an empty array to skip section checking.
            const REQUIRED_SECTIONS = [
              "describe",     // e.g., "### Describe the bug"
              "steps to reproduce",
              "expected behavior"
            ];

            // Label to apply on non-compliant issues
            const LABEL = "needs-more-info";
            // ──────────────────────────────────────────────────────────

            const problems = [];

            // Check 1: Body is too short or missing
            if (body.trim().length < MIN_BODY_LENGTH) {
              problems.push(
                `- The issue body is too short (${body.trim().length} chars). ` +
                `Please provide at least ${MIN_BODY_LENGTH} characters of detail.`
              );
            }

            // Check 2: Required sections are present
            if (REQUIRED_SECTIONS.length > 0) {
              const bodyLower = body.toLowerCase();
              const missingSections = REQUIRED_SECTIONS.filter(
                section => !bodyLower.includes(section.toLowerCase())
              );

              if (missingSections.length > 0) {
                problems.push(
                  `- Missing required sections: **${missingSections.join("**, **")}**. ` +
                  `Please use the issue template and fill out all sections.`
                );
              }
            }

            // All good — exit early
            if (problems.length === 0) {
              console.log("Issue template compliance check passed.");
              return;
            }

            // ── Non-Compliant: Comment and Label ──────────────────────
            console.log(`Issue #${issue.number} failed template check.`);

            const comment = [
              `@${author} 👋 Thanks for opening this issue!`,
              ``,
              `However, it looks like some information is missing:`,
              ``,
              ...problems,
              ``,
              `Please edit this issue to provide the required details. ` +
              `This helps maintainers understand and address your issue faster.`,
              ``,
              `*This is an automated check. The \`${LABEL}\` label will be ` +
              `removed once the issue is updated.*`
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [LABEL]
            });
