# ============================================================================
# Workflow: WIP / Draft Enforcer
# ============================================================================
# Fails CI if a PR title contains WIP markers, preventing accidental merge
# of work-in-progress pull requests.
#
# Manual dispatch: Reviews ALL open PRs for WIP markers.
#
# Portability: ✅ Drop-in
# ============================================================================

name: WIP / Draft Enforcer

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch: # Manual trigger — reviews all open PRs

jobs:
  wip-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Block WIP Pull Requests
        uses: actions/github-script@v7
        with:
          script: |
            // ── WIP Patterns ──────────────────────────────────────────
            const WIP_PATTERNS = [
              /^\[WIP\]/i,
              /^WIP:/i,
              /^WIP\s/i,
              /^\(WIP\)/i,
              /^Draft:/i,
              /🚧/,
            ];

            function isWIP(pr) {
              const title = pr.title || "";
              return pr.draft || WIP_PATTERNS.some(p => p.test(title));
            }

            async function checkPR(pr) {
              if (isWIP(pr)) {
                const reason = pr.draft ? "marked as Draft" : `title contains WIP marker`;
                console.log(`PR #${pr.number}: ❌ ${reason}`);
                core.setFailed(
                  `PR #${pr.number} is work-in-progress (${reason}). ` +
                  `Remove the WIP marker or mark as Ready for Review to proceed.`
                );
                return false;
              }
              console.log(`PR #${pr.number}: ✅ Not WIP.`);
              return true;
            }

            // ── Dispatch mode ─────────────────────────────────────────
            if (context.eventName === "workflow_dispatch") {
              console.log("Manual dispatch: reviewing all open PRs...");
              const prs = await github.paginate(
                github.rest.pulls.list,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: "open",
                  per_page: 100
                }
              );
              console.log(`Found ${prs.length} open PR(s).`);
              const wipPRs = [];
              for (const pr of prs) {
                if (isWIP(pr)) wipPRs.push(`#${pr.number}`);
              }
              if (wipPRs.length > 0) {
                console.log(`WIP PRs found: ${wipPRs.join(", ")}`);
              } else {
                console.log("No WIP PRs found.");
              }
              return;
            }

            // ── Event mode ────────────────────────────────────────────
            await checkPR(context.payload.pull_request);
