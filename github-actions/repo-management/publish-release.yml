# ============================================================================
# Workflow: Publish Release on Tag
# ============================================================================
# Creates a GitHub Release with auto-generated release notes whenever a
# new version tag (v*) is pushed.
#
# Portability: ✅ Drop-in
# ============================================================================

name: Publish Release on Tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Manual trigger (must provide tag via inputs)
    inputs:
      tag:
        description: 'Tag to create release for (e.g., v1.2.3)'
        required: true
        type: string

jobs:
  publish-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            // Determine the tag
            let tag;
            if (context.eventName === 'workflow_dispatch') {
              tag = '${{ inputs.tag }}';
            } else {
              tag = context.ref.replace('refs/tags/', '');
            }

            console.log(`Creating release for tag: ${tag}`);

            // Check if a release already exists for this tag
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag
              });
              console.log(`Release for ${tag} already exists: ${existing.html_url}`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            // Determine if this is a pre-release (e.g., v1.0.0-beta.1)
            const isPreRelease = /-(alpha|beta|rc|dev|preview)/i.test(tag);

            // Create the release with auto-generated notes
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
              prerelease: isPreRelease,
              draft: false
            });

            console.log(`✅ Release created: ${release.html_url}`);
