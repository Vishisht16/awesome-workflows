# ============================================================================
# Workflow: Old Workflow Run Cleanup
# ============================================================================
# Periodically deletes old workflow run logs and artifacts to save storage.
#
# Portability: 🔧 Configurable
#   - Adjust RETENTION_DAYS to your preference.
# ============================================================================

name: Old Workflow Run Cleanup

on:
  schedule:
    # Runs every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Manual trigger

jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete Old Workflow Runs
        uses: actions/github-script@v7
        with:
          script: |
            // ── Configuration ─────────────────────────────────────────
            const RETENTION_DAYS = 30;
            // ──────────────────────────────────────────────────────────

            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - RETENTION_DAYS);
            console.log(`Deleting workflow runs older than ${RETENTION_DAYS} days (before ${cutoff.toISOString()})...`);

            // Fetch all workflows in the repo
            const workflows = await github.paginate(
              github.rest.actions.listRepoWorkflows,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              }
            );

            let totalDeleted = 0;

            for (const workflow of workflows) {
              // Get completed runs for this workflow
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflow.id,
                  status: "completed",
                  per_page: 100
                }
              );

              const oldRuns = runs.filter(r => new Date(r.created_at) < cutoff);

              for (const run of oldRuns) {
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id
                  });
                  totalDeleted++;
                } catch (e) {
                  console.log(`Could not delete run ${run.id}: ${e.message}`);
                }
              }

              if (oldRuns.length > 0) {
                console.log(`${workflow.name}: deleted ${oldRuns.length} old run(s).`);
              }
            }

            console.log(`Done. Deleted ${totalDeleted} total workflow run(s).`);
