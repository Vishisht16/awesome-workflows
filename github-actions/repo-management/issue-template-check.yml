# ============================================================================
# Workflow: Issue Template Checker
# ============================================================================
# Validates that newly opened issues actually filled out the issue template
# instead of deleting it or submitting an empty body. Adds a label and
# comments if the issue doesn't meet minimum requirements.
#
# Manual dispatch: Reviews ALL open issues for template compliance.
#
# Portability: Configurable
#   - Adjust MIN_BODY_LENGTH for your needs.
#   - Edit REQUIRED_SECTIONS to match your issue template's headings.
# ============================================================================

name: Issue Template Checker

on:
  issues:
    types: [opened]
  workflow_dispatch: # Manual trigger -- reviews all open issues

jobs:
  check-template:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Validate Issue Template Compliance
        uses: actions/github-script@v7
        with:
          script: |
            // -- Configuration -----------------------------------------
            const MIN_BODY_LENGTH = 50;
            const REQUIRED_SECTIONS = [
              "describe",
              "steps to reproduce",
              "expected behavior"
            ];
            const LABEL = "needs-more-info";
            // --------------------------------------------------------------

            async function checkIssue(issue) {
              const body = issue.body || "";
              const author = issue.user.login;
              const existingLabels = issue.labels.map(l => l.name);

              // Skip if already labeled
              if (existingLabels.includes(LABEL)) {
                console.log(`Issue #${issue.number}: Already has "${LABEL}" label. Skipping.`);
                return;
              }

              const problems = [];

              if (body.trim().length < MIN_BODY_LENGTH) {
                problems.push(
                  `- The issue body is too short (${body.trim().length} chars). ` +
                  `Please provide at least ${MIN_BODY_LENGTH} characters of detail.`
                );
              }

              if (REQUIRED_SECTIONS.length > 0) {
                const bodyLower = body.toLowerCase();
                const missing = REQUIRED_SECTIONS.filter(
                  s => !bodyLower.includes(s.toLowerCase())
                );
                if (missing.length > 0) {
                  problems.push(
                    `- Missing required sections: **${missing.join("**, **")}**. ` +
                    `Please use the issue template and fill out all sections.`
                  );
                }
              }

              if (problems.length === 0) {
                console.log(`Issue #${issue.number}: Template check passed.`);
                return;
              }

              console.log(`Issue #${issue.number}: Failed template check.`);

              const comment = [
                `@${author} Thanks for opening this issue!`,
                ``,
                `However, it looks like some information is missing:`,
                ``,
                ...problems,
                ``,
                `Please edit this issue to provide the required details. ` +
                `This helps maintainers understand and address your issue faster.`,
                ``,
                `*This is an automated check. The \`${LABEL}\` label will be ` +
                `removed once the issue is updated.*`
              ].join("\n");

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: comment
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [LABEL]
              });
            }

            // -- Dispatch mode -----------------------------------------
            if (context.eventName === "workflow_dispatch") {
              console.log("Manual dispatch: reviewing all open issues...");
              const issues = await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: "open",
                  per_page: 100
                }
              );
              const realIssues = issues.filter(i => !i.pull_request);
              console.log(`Found ${realIssues.length} open issue(s) to review.`);
              for (const issue of realIssues) {
                await checkIssue(issue);
              }
              return;
            }

            // -- Event mode --------------------------------------------
            await checkIssue(context.payload.issue);
