# ============================================================================
# Workflow: Weekly Activity Digest
# ============================================================================
# Generates a weekly summary of repository activity and sends it to a
# Slack or Discord webhook. Covers issues opened/closed, PRs merged,
# and new contributors.
#
# Portability: Needs Setup
#   - Create a repo secret `WEBHOOK_URL` with your Slack or Discord webhook.
#   - Adjust WEBHOOK_PLATFORM to "slack" or "discord".
# ============================================================================

name: Weekly Activity Digest

on:
  schedule:
    # Runs every Friday at 16:00 UTC
    - cron: '0 16 * * 5'
  workflow_dispatch: # Manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    steps:
      - name: Generate and Send Weekly Digest
        uses: actions/github-script@v7
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        with:
          script: |
            // -- Configuration -----------------------------------------
            const WEBHOOK_PLATFORM = "discord"; // "slack" or "discord"
            const DAYS_BACK = 7;
            // --------------------------------------------------------------

            const webhookUrl = process.env.WEBHOOK_URL;
            if (!webhookUrl) {
              core.warning("WEBHOOK_URL secret is not set. Skipping digest.");
              return;
            }

            const since = new Date();
            since.setDate(since.getDate() - DAYS_BACK);
            const sinceISO = since.toISOString();

            const repo = `${context.repo.owner}/${context.repo.repo}`;

            // -- Gather Stats ------------------------------------------
            // Issues opened this week
            const issuesOpened = await github.rest.search.issuesAndPullRequests({
              q: `repo:${repo} is:issue created:>=${sinceISO}`,
              per_page: 1
            });

            // Issues closed this week
            const issuesClosed = await github.rest.search.issuesAndPullRequests({
              q: `repo:${repo} is:issue closed:>=${sinceISO}`,
              per_page: 1
            });

            // PRs merged this week
            const prsMerged = await github.rest.search.issuesAndPullRequests({
              q: `repo:${repo} is:pr merged:>=${sinceISO}`,
              per_page: 1
            });

            // PRs opened this week
            const prsOpened = await github.rest.search.issuesAndPullRequests({
              q: `repo:${repo} is:pr created:>=${sinceISO}`,
              per_page: 1
            });

            const stats = {
              issuesOpened: issuesOpened.data.total_count,
              issuesClosed: issuesClosed.data.total_count,
              prsOpened: prsOpened.data.total_count,
              prsMerged: prsMerged.data.total_count,
            };

            console.log("Weekly stats:", JSON.stringify(stats));

            // -- Format Message ----------------------------------------
            const lines = [
              `**Weekly Activity Digest** -- ${repo}`,
              `_${since.toDateString()} -> ${new Date().toDateString()}_`,
              ``,
              `Issues opened: **${stats.issuesOpened}**`,
              `Issues closed: **${stats.issuesClosed}**`,
              `PRs opened: **${stats.prsOpened}**`,
              `PRs merged: **${stats.prsMerged}**`,
            ];

            const text = lines.join("\n");

            // -- Send Webhook ------------------------------------------
            let payload;
            if (WEBHOOK_PLATFORM === "slack") {
              payload = JSON.stringify({ text: text });
            } else {
              // Discord
              payload = JSON.stringify({ content: text });
            }

            const response = await fetch(webhookUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: payload
            });

            if (response.ok) {
              console.log(`[OK] Digest sent to ${WEBHOOK_PLATFORM}.`);
            } else {
              core.setFailed(`Webhook failed: ${response.status} ${response.statusText}`);
            }

            // Also post to workflow summary
            core.summary.addHeading("Weekly Activity Digest", 2);
            core.summary.addRaw(text);
            await core.summary.write();
