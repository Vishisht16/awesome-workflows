# ============================================================================
# Workflow: PR Title Linter (Conventional Commits)
# ============================================================================
# Enforces that PR titles follow the Conventional Commits specification:
#   type(scope): description     e.g., feat(auth): add OAuth2 login
#   type: description            e.g., fix: resolve null pointer crash
#
# Manual dispatch: Reviews ALL open PRs for title compliance.
#
# Portability: Configurable
#   - Edit ALLOWED_TYPES and REQUIRE_SCOPE to match your project.
# ============================================================================

name: PR Title Linter

on:
  pull_request:
    types: [opened, edited, reopened]
  workflow_dispatch: # Manual trigger -- reviews all open PRs

jobs:
  lint-title:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Validate PR Title Format
        uses: actions/github-script@v7
        with:
          script: |
            // -- Configuration -----------------------------------------
            const ALLOWED_TYPES = [
              "feat", "fix", "docs", "style", "refactor",
              "perf", "test", "build", "ci", "chore", "revert"
            ];
            const REQUIRE_SCOPE = false; // Set true to require (scope)
            // --------------------------------------------------------------

            const typePattern = ALLOWED_TYPES.join("|");
            const scopePart = REQUIRE_SCOPE ? "\\([a-z0-9_-]+\\)" : "(\\([a-z0-9_-]+\\))?";
            const regex = new RegExp(`^(${typePattern})${scopePart}(!)?:\\s.+$`, "i");

            async function lintPR(pr) {
              const title = pr.title || "";

              if (regex.test(title)) {
                console.log(`PR #${pr.number}: Title "${title}" [OK]`);
                return;
              }

              console.log(`PR #${pr.number}: Title "${title}" [FAIL]`);

              const comment = [
                `WARNING: **PR Title does not follow Conventional Commits format**`,
                ``,
                `Your title: \`${title}\``,
                ``,
                `Expected format: \`type(scope): description\``,
                ``,
                `**Allowed types:** ${ALLOWED_TYPES.map(t => `\`${t}\``).join(", ")}`,
                ``,
                `**Examples:**`,
                `- \`feat(auth): add OAuth2 login\``,
                `- \`fix: resolve null pointer crash\``,
                `- \`docs: update API reference\``,
                ``,
                `Please update your PR title and try again.`
              ].join("\n");

              // Only comment if we haven't already commented about this
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 10
              });

              const alreadyCommented = comments.data.some(
                c => c.body.includes("PR Title does not follow Conventional Commits")
              );

              if (!alreadyCommented) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: comment
                });
              }

              core.setFailed(`PR title "${title}" does not match Conventional Commits format.`);
            }

            // -- Dispatch mode -----------------------------------------
            if (context.eventName === "workflow_dispatch") {
              console.log("Manual dispatch: reviewing all open PRs...");
              const prs = await github.paginate(
                github.rest.pulls.list,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: "open",
                  per_page: 100
                }
              );
              console.log(`Found ${prs.length} open PR(s).`);
              let failures = 0;
              for (const pr of prs) {
                try { await lintPR(pr); } catch { failures++; }
              }
              if (failures > 0) {
                core.setFailed(`${failures} PR(s) have non-compliant titles.`);
              }
              return;
            }

            // -- Event mode --------------------------------------------
            await lintPR(context.payload.pull_request);
